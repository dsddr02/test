# 文件名: .github/workflows/clawcloud-login.yml
name: Clawed4

on:
  schedule:
    - cron: '0 16 8,22 * *'
  workflow_dispatch:

jobs:
  auto-login:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pyotp requests
          playwright install chromium

      - name: Run Login Script
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAMEed }}
          GH_PASSWORD: ${{ secrets.GH_PASSWORDed }}
          GH_2FA_SECRET: ${{ secrets.GH_2FA_SECRETed }}
          GH_BOTTOKEN: ${{ secrets.GH_BOTTOKEN }}
          GH_CHATID: ${{ secrets.GH_CHATID }}
          ZANGHU: ${{ secrets.ZANGHUed }}
        run: python -u login_script.py

      - name: Upload Debug Screenshot
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: login-result
          path: |
            *.png
            
          retention-days: 3
